version = 1

[phases.format]
enabled = true
command = "python3 -m ruff format --check ."
run_on_edit = true
run_pre_commit = true
run_pre_push = true
run_in_ci = true

[phases.lint]
enabled = true
command = "python3 -m ruff check ."
run_on_edit = true
run_pre_commit = true
run_pre_push = true
run_in_ci = true

[phases.typecheck]
enabled = true
command = "python3 -m mypy"
run_on_edit = true
run_pre_commit = true
run_pre_push = true
run_in_ci = true

[phases.build]
enabled = true
command = "python3 -m compileall src tests scripts"
run_pre_push = true
run_in_ci = true

[phases.test_unit]
enabled = true
command = "python3 -m pytest"
run_on_edit = true
run_pre_commit = true
run_pre_push = true
run_in_ci = true

[phases.test_integration]
enabled = false
command = ""

[phases.test_e2e]
enabled = false
command = ""

[phases.test_component]
enabled = false
command = ""

[phases.test_contract]
enabled = false
command = ""

[phases.accessibility]
enabled = false
command = ""

[phases.performance]
enabled = false
command = ""

[phases.bundle_size]
enabled = false
command = ""
